# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Celery

on:
  push:
    branches: [ 'main']
    paths:
        - '**.py'
        - '**.txt'
        - '.github/workflows/python-package.yml'
        - '**.toml'
        - "tox.ini"
  pull_request:
    branches: [ 'main' ]
    paths:
        - '**.py'
        - '**.txt'
        - '**.toml'
        - '.github/workflows/python-package.yml'
        - "tox.ini"
  workflow_dispatch:


permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  Unit:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14', 'pypy3.11']
        os: ["blacksmith-4vcpu-ubuntu-2404", "windows-latest"]
        exclude:
            - python-version: '3.10'
              os: "windows-latest"
            - python-version: '3.11'
              os: "windows-latest"
            - python-version: '3.12'
              os: "windows-latest"
            - python-version: '3.13'
              os: "windows-latest"
            - python-version: '3.14t'
              os: "windows-latest"
            - python-version: 'pypy3.11'
              os: "windows-latest"

    steps:
    - name: Install apt packages
      if: startsWith(matrix.os, 'blacksmith-4vcpu-ubuntu')
      run: |
        echo 'Acquire::ForceIPv4 "true";' | sudo tee /etc/apt/apt.conf.d/99force-ipv4
        sudo apt-get update
        sudo apt-get install -f libcurl4-openssl-dev libev-dev libssl-dev libgnutls28-dev httping expect libmemcached-dev

    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
        cache: 'pip'
        cache-dependency-path: '**/setup.py'

    - name: Install tox
      run: python -m pip install --upgrade pip 'tox' tox-gh-actions
    - name: >
        Run tox for
        "${{ matrix.python-version }}-unit"
      timeout-minutes: 30
      run: |
        tox --verbose --verbose

    - uses: codecov/codecov-action@v6
      with:
        flags: unittests # optional
        fail_ci_if_error: true # optional (default = false)
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true # optional (default = false)

    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@v6
      with:
        report_type: test_results
        token: ${{ secrets.CODECOV_TOKEN }}

  Discover-test-modules:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      integration: ${{ steps.scan.outputs.integration }}
      smoke: ${{ steps.scan.outputs.smoke }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            t/integration
            t/smoke/tests
      - id: scan
        run: |
          nested=$(find t/integration -mindepth 2 -name 'test_*.py')
          if [ -n "$nested" ]; then
            echo "::error::Integration test files must live at t/integration/ root, not in subdirectories: $nested"
            exit 1
          fi
          integration=$(find t/integration -maxdepth 1 -name 'test_*.py' -printf '%f\n' | sort | jq -R -s -c 'split("\n") | map(select(. != ""))')

          smoke_raw=$(find t/smoke/tests -name 'test_*.py' -printf '%f\n' | sort)
          dupes=$(echo "$smoke_raw" | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::error::Duplicate smoke test filenames across subdirectories: $dupes"
            exit 1
          fi
          smoke=$(echo "$smoke_raw" | jq -R -s -c 'split("\n") | map(select(. != ""))')

          echo "integration=$integration" >> $GITHUB_OUTPUT
          echo "smoke=$smoke" >> $GITHUB_OUTPUT

  Integration-tests:
    needs: [Unit, Discover-test-modules]
    strategy:
      matrix:
        module: ${{ fromJson(needs.Discover-test-modules.outputs.integration) }}
    uses: ./.github/workflows/integration-tests.yml
    with:
      module_name: ${{ matrix.module }}

  Smoke-tests:
    needs: [Unit, Discover-test-modules]
    strategy:
      matrix:
        module: ${{ fromJson(needs.Discover-test-modules.outputs.smoke) }}
    uses: ./.github/workflows/smoke-tests.yml
    with:
      module_name: ${{ matrix.module }}
